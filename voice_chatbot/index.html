<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg-color: #212121;
            --sidebar-bg: #171717;
            --text-color: #ececec;
            --text-muted: #b4b4b4;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #3a3a3a;
            --message-user-bg: #2f2f2f;
            --message-ai-bg: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-group select {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            font-family: inherit;
        }

        .clear-btn {
            margin-top: auto;
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .clear-btn:hover {
            background-color: #ef4444;
            color: white;
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            padding: 1rem 1.2rem;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            max-width: 80%;
        }

        .message.user .message-content {
            background-color: var(--message-user-bg);
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background-color: var(--message-ai-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            width: 100%;
        }
        
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-start;
        }
        .action-btn {
            background: none;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .action-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .dropdown-container {
            position: relative;
            display: inline-block;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            background-color: #2c2c2c;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 10;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .dropdown-item:hover {
            background-color: #3d3d3d;
        }

        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 0.5rem;
        }

        .message audio {
            margin-top: 1rem;
            width: 100%;
            height: 40px;
        }

        /* Markdown Styles */
        .markdown-body p {
            margin: 0 0 10px 0;
        }
        .markdown-body p:last-child {
            margin-bottom: 0;
        }
        .markdown-body pre {
            background-color: #111111;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid var(--border-color);
        }
        .markdown-body code {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
            background-color: rgba(0,0,0,0.2);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem;
            background: linear-gradient(180deg, transparent, var(--bg-color) 40%);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--message-user-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            gap: 0.5rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-container input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 0.8rem 0;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--text-color);
            background-color: var(--border-color);
        }

        .send-btn {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .send-btn:hover {
            background-color: #fff;
            color: var(--bg-color);
        }

        #file-upload {
            display: none;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-img {
            max-height: 50px;
            border-radius: 6px;
            margin-right: 10px;
            display: none;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .recording {
            color: #ef4444 !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🔊 Voice Chatbot</h2>
        

        <div class="form-group">
            <label for="lang-select">Spoken Language</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="ur">Urdu</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="tl">Filipino</option>
            </select>
        </div>

        <button class="clear-btn" id="clear-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            Clear Chat
        </button>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chat-container">
            <!-- Messages will be injected here -->
        </div>

        <div class="input-area">
            <div class="input-container">
                <label for="file-upload" class="action-btn" title="Upload Image">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </label>
                <input type="file" id="file-upload" accept="image/*">
                <img id="image-preview" class="preview-img" src="" alt="preview">

                <input type="text" id="chat-input" placeholder="Message Voice Chatbot..." autocomplete="off">
                
                <button class="action-btn" id="mic-btn" title="Start Dictation">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button class="action-btn send-btn" id="send-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const langSelect = document.getElementById('lang-select');
        const fileUpload = document.getElementById('file-upload');
        const micBtn = document.getElementById('mic-btn');
        const imagePreview = document.getElementById('image-preview');
        
        // Close all dropdowns when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                menu.classList.remove('show');
            });
        });

        let imageBase64 = null;
        let isRecording = false;
        let recognition = null;
        let useWebSpeech = false;
        
        try {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                
                recognition.onstart = function() {
                    isRecording = true;
                    micBtn.classList.add('recording');
                    chatInput.placeholder = "Listening...";
                };
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    chatInput.value = transcript;
                    chatInput.placeholder = "Message Voice Chatbot...";
                    sendMessage();
                };
                
                recognition.onerror = function(event) {
                    console.error("Speech recognition error:", event.error);
                    chatInput.placeholder = "Message Voice Chatbot...";
                    alert("Transcription failed: " + event.error);
                    isRecording = false;
                    micBtn.classList.remove('recording');
                };
                
                recognition.onend = function() {
                    isRecording = false;
                    micBtn.classList.remove('recording');
                    if (chatInput.placeholder === "Listening...") {
                        chatInput.placeholder = "Message Voice Chatbot...";
                    }
                };
                useWebSpeech = true;
            }
        } catch (err) {
            console.error("Web Speech API not available:", err);
            useWebSpeech = false;
        }

        let audioContext;
        let mediaStreamSource;
        let processor;
        let recordingChunks = [];
        let sampleRate = 44100;
        let activeStream = null;

        micBtn.addEventListener('click', async () => {
            if (useWebSpeech && recognition) {
                if (isRecording) {
                    recognition.stop();
                } else {
                    const langMap = { 'en': 'en-US', 'ur': 'ur-PK', 'es': 'es-ES', 'de': 'de-DE', 'fr': 'fr-FR', 'ar': 'ar-SA', 'hi': 'hi-IN', 'tl': 'tl-PH' };
                    recognition.lang = langMap[langSelect.value] || 'en-US';
                    try {
                        recognition.start();
                    } catch(e) {
                        console.error("Failed to start recognition:", e);
                        useWebSpeech = false;
                        await fallbackToWav();
                    }
                }
            } else {
                // Fallback to WAV recording
                if (isRecording) {
                    stopRecordingWavAndSend();
                } else {
                    await fallbackToWav();
                }
            }
        });

        async function fallbackToWav() {
            try {
                await startRecordingWav();
            } catch(e) {
                alert("Could not access microphone: " + e);
            }
        }

        async function startRecordingWav() {
            activeStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 48000
                } 
            });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            sampleRate = audioContext.sampleRate;
            mediaStreamSource = audioContext.createMediaStreamSource(activeStream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            recordingChunks = [];
            isRecording = true;

            processor.onaudioprocess = function (e) {
                if (!isRecording) return;
                const inputData = e.inputBuffer.getChannelData(0);
                recordingChunks.push(new Float32Array(inputData));
            };

            mediaStreamSource.connect(processor);
            processor.connect(audioContext.destination);
            
            micBtn.classList.add('recording');
            chatInput.placeholder = "Listening...";
        }

        function stopRecordingWavAndSend() {
            isRecording = false;
            micBtn.classList.remove('recording');
            chatInput.placeholder = "Processing Audio...";

            if (processor) processor.disconnect();
            if (mediaStreamSource) mediaStreamSource.disconnect();
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
                activeStream = null;
            }
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close().catch(e => console.error(e));
            }
            
            let length = 0;
            recordingChunks.forEach(chunk => length += chunk.length);
            let combined = new Float32Array(length);
            let offset = 0;
            recordingChunks.forEach(chunk => {
                combined.set(chunk, offset);
                offset += chunk.length;
            });

            const wavBlob = createWavBlob(combined, sampleRate);
            const langMap = { 'en': 'en-US', 'ur': 'ur-PK', 'es': 'es-ES', 'de': 'de-DE', 'fr': 'fr-FR', 'ar': 'ar-SA', 'hi': 'hi-IN', 'tl': 'tl-PH' };
            const lang = langMap[langSelect.value] || 'en-US';
            
            const formData = new FormData();
            formData.append("audio", wavBlob, "audio.wav");
            formData.append("language", lang);
            
            fetch('/transcribe', {
                method: 'POST',
                body: formData
            })
            .then(async r => {
                if(!r.ok) {
                    const err = await r.json();
                    throw new Error(err.detail || 'Server error');
                }
                return r.json();
            })
            .then(data => {
                if(data.text) {
                    chatInput.value = data.text;
                    chatInput.placeholder = "Message Voice Chatbot...";
                    sendMessage();
                }
            })
            .catch(e => {
                chatInput.placeholder = "Message Voice Chatbot...";
                alert("Transcription failed: " + e.message);
            });
        }

        function createWavBlob(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeString = function (view, offset, string) {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);
            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
            return new Blob([view], { type: 'audio/wav' });
        }

        // (loadModels removed since we only use llava:latest)

        // Load History
        async function loadHistory() {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                chatContainer.innerHTML = '';
                data.history.forEach(msg => {
                    appendMessage(msg.role, msg.content, msg.images ? msg.images[0] : null, msg.audio_url);
                });
                scrollToBottom();
            } catch (e) {
                console.error("Failed to load history");
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(role, content, imgData = null, audioUrl = null, autoPlay = false) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let html = `<div class="message-content">`;
            
            // Text
            if (content) {
                let parsedContent = content;
                try {
                    if (typeof marked !== 'undefined') {
                        parsedContent = marked.parse(content);
                    }
                } catch (err) {
                    console.error("Markdown parsing error:", err);
                }
                html += `<div class="markdown-body">${parsedContent}</div>`;
            }
            
            // Image
            if (imgData) {
                html += `<img src="${imgData}" alt="Uploaded image" style="max-width:300px; margin-top:10px;">`;
            }
            
            html += `</div>`;
            
            // Add action bar for AI messages
            if (role === 'ai') {
                html += `
                <div class="message-actions">`;
                
                if (audioUrl) {
                    html += `
                    <button class="action-btn play-audio-btn" title="Listen">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>`;
                }

                html += `
                    <div class="dropdown-container">
                        <button class="action-btn more-options-btn" title="More options">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                            </svg>
                        </button>
                        <div class="dropdown-menu">`;
                
                if (audioUrl) {
                    html += `<div class="dropdown-item download-audio-btn">Download Audio (MP3)</div>`;
                }
                html += `<div class="dropdown-item download-text-btn">Download Text</div>
                        </div>
                    </div>
                </div>`;
            }
            
            div.innerHTML = html;
            chatContainer.appendChild(div);
            
            // Apply syntax highlighting to code blocks
            try {
                if (typeof hljs !== 'undefined') {
                    div.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            } catch (err) {
                console.error("Highlight.js error:", err);
            }
            
            // Action Buttons Logic
            if (role === 'ai') {
                const playBtn = div.querySelector('.play-audio-btn');
                const moreBtn = div.querySelector('.more-options-btn');
                const dropdownMenu = div.querySelector('.dropdown-menu');
                const downloadAudioBtn = div.querySelector('.download-audio-btn');
                const downloadTextBtn = div.querySelector('.download-text-btn');
                
                let currentAudio = null;
                
                if (playBtn && audioUrl) {
                    playBtn.addEventListener('click', () => {
                        if (!currentAudio) {
                            currentAudio = new Audio(audioUrl);
                            currentAudio.onended = () => { 
                                playBtn.style.color = '#a0a0a0'; 
                            };
                        }
                        
                        if (currentAudio.paused) {
                            currentAudio.play().catch(e => console.error("Playback failed:", e));
                            playBtn.style.color = '#fff';
                        } else {
                            currentAudio.pause();
                            playBtn.style.color = '#a0a0a0';
                        }
                    });
                }

                if (moreBtn && dropdownMenu) {
                    moreBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // Close others
                        document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                            if (menu !== dropdownMenu) menu.classList.remove('show');
                        });
                        dropdownMenu.classList.toggle('show');
                    });

                    if (downloadAudioBtn && audioUrl) {
                        downloadAudioBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            dropdownMenu.classList.remove('show');
                            const a = document.createElement('a');
                            a.href = audioUrl;
                            a.download = `voice_response_${Date.now()}.mp3`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                        });
                    }

                    if (downloadTextBtn) {
                        downloadTextBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            dropdownMenu.classList.remove('show');
                            const blob = new Blob([content], {type: 'text/plain'});
                            const url = window.URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `response_text_${Date.now()}.txt`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            window.URL.revokeObjectURL(url);
                        });
                    }
                }
            }
        }

        function appendLoader() {
            const div = document.createElement('div');
            div.className = `message ai`;
            div.id = 'ai-loader';
            div.innerHTML = `<div class="message-content"><div class="loader"></div></div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function removeLoader() {
            const loader = document.getElementById('ai-loader');
            if (loader) loader.remove();
        }

        // Image upload preview
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    imageBase64 = evt.target.result;
                    imagePreview.src = imageBase64;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Send Message
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text && !imageBase64) return;

            const selectedLang = langSelect.value;
            
            const payload = {
                model: 'llava:latest',
                message: text,
                language_tts: selectedLang,
                image_base64: imageBase64
            };

            // Optimistic UI update
            appendMessage('user', text, imageBase64);
            chatInput.value = '';
            imageBase64 = null;
            imagePreview.src = '';
            imagePreview.style.display = 'none';
            fileUpload.value = '';
            
            appendLoader();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                removeLoader();
                
                if (res.ok) {
                    const data = await res.json();
                    appendMessage('ai', data.content, null, data.audio_url, true);
                    scrollToBottom();
                } else {
                    const err = await res.json();
                    appendMessage('ai', `Error: ${err.detail}`);
                    scrollToBottom();
                }
            } catch (e) {
                console.error("Chat fetch error:", e);
                removeLoader();
                // Ensure we don't crash again if appendMessage fails
                try {
                    appendMessage('ai', `Error connecting to server. Detail: ${e.message}`);
                } catch (fallbackErr) {
                    alert("Critical Error: " + e.message);
                }
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', async () => {
            if(confirm("Are you sure you want to clear the chat?")) {
                await fetch('/clear_history', { method: 'POST' });
                chatContainer.innerHTML = '';
            }
        });

        window.onload = () => {
            loadHistory();
        };</script>
</body>
</html>
